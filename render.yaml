# AI Outreach Engine - Render Blueprint
# Deploy: Connect repo, create Blueprint, set RAILS_MASTER_KEY + env vars

databases:
  - name: ai-outreach-db
    plan: free

services:
  - type: web
    name: ai-outreach-web
    runtime: ruby
    plan: free
    buildCommand: ./bin/render-build.sh
    startCommand: bundle exec puma -C config/puma.rb
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-outreach-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: WEB_CONCURRENCY
        value: 2

  - type: worker
    name: ai-outreach-jobs
    runtime: ruby
    plan: free
    buildCommand: ./bin/render-build.sh
    startCommand: bin/jobs start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ai-outreach-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
